name: Inventory Azure Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: inventory-azure-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      API_PROJECT_PATH: inventory-backend/InventoryPro.Api/InventoryPro.Api.csproj
      API_PUBLISH_PATH: inventory-backend/artifacts/publish-azure
      API_ZIP_PATH: inventory-backend/artifacts/inventory-api.zip
      FRONTEND_PATH: inventory-frontend
      FRONTEND_DIST_PATH: inventory-frontend/dist

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_PATH }}
        env:
          VITE_API_BASE_URL: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net
        run: |
          npx vite build
          cp dist/index.html dist/404.html

      - name: Publish backend API
        run: dotnet publish "${{ env.API_PROJECT_PATH }}" -c Release -o "${{ env.API_PUBLISH_PATH }}"

      - name: Package backend API
        run: |
          rm -f "${{ env.API_ZIP_PATH }}"
          cd "${{ env.API_PUBLISH_PATH }}"
          zip -r "../inventory-api.zip" .

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Select Azure subscription
        run: az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Configure backend app settings
        run: |
          az webapp config appsettings set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --settings \
              ASPNETCORE_ENVIRONMENT=Production \
              Cors__Origins__0="https://${{ secrets.AZURE_STORAGE_ACCOUNT }}.z6.web.core.windows.net" \
              Cors__Origins__1="http://localhost:3000" \
              Cors__Origins__2="http://localhost:5173"

      - name: Deploy backend to Azure Web App
        run: |
          az webapp deploy \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --src-path "${{ env.API_ZIP_PATH }}" \
            --type zip

      - name: Configure static website fallback
        run: |
          az storage blob service-properties update \
            --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            --account-key "${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}" \
            --static-website \
            --index-document index.html \
            --404-document 404.html

      - name: Upload frontend to Azure static website
        run: |
          az storage blob upload-batch \
            --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            --account-key "${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}" \
            --destination '$web' \
            --source "${{ env.FRONTEND_DIST_PATH }}" \
            --overwrite

      - name: Restart backend web app
        run: |
          az webapp restart \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Smoke checks
        run: |
          set -e
          curl -f "https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health"
          curl -f "https://${{ secrets.AZURE_STORAGE_ACCOUNT }}.z6.web.core.windows.net/"
